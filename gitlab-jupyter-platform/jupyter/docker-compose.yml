services:
  jupyterhub:
    build:
      context: ./jupyterhub
      dockerfile: Dockerfile
    container_name: gitlab-jupyterhub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${JUPYTERHUB_HOST_PORT:-18010}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyterhub-data:/srv/jupyterhub
    extra_hosts:
      - "gitlab.local:host-gateway"
    networks:
      - gitlab-jupyter-net

  singleuser:
    build:
      context: ./singleuser
      dockerfile: Dockerfile
    image: ${SINGLEUSER_IMAGE:-gitlab-jupyter-singleuser:latest}
    profiles:
      - jupyterhub-spawnable

networks:
  gitlab-jupyter-net:
    name: ${DOCKER_NETWORK_NAME:-gitlab-jupyter-net}
    external: true

volumes:
  jupyterhub-data:
    name: gitlab-jupyterhub-data
