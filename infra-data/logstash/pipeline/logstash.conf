input {
  beats {
    port => 5044
  }
  tcp {
    port => 50000
    codec => json_lines
  }
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Handle malformed JSON from TCP (json_lines will tag _jsonparsefailure)
  if "_jsonparsefailure" in [tags] {
    mutate {
      add_field => {
        "level"   => "ERROR"
        "service" => "unknown"
        "message" => "Malformed JSON received: %{message}"
      }
    }
  }

  # Normalize timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "UNIX", "UNIX_MS"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Normalize log level
  if [level] {
    mutate { uppercase => ["level"] }
  } else if [log_level] {
    mutate {
      rename    => { "log_level" => "level" }
      uppercase => ["level"]
    }
  } else if [severity] {
    mutate {
      rename    => { "severity" => "level" }
      uppercase => ["level"]
    }
  } else {
    mutate { add_field => { "level" => "INFO" } }
  }

  # Ensure service field exists
  if ![service] {
    mutate { add_field => { "service" => "unknown" } }
  }

  # Ensure env field exists
  if ![env] {
    mutate { add_field => { "env" => "local" } }
  }

  # Tag by source
  if [agent] {
    mutate { add_tag => ["beats"] }
  } else {
    mutate { add_tag => ["tcp"] }
  }

  # Remove Logstash internal metadata fields
  mutate {
    remove_field => ["@version", "host", "port"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_URL}"]
    user     => "${ELASTIC_USER:-elastic}"
    password => "${ELASTIC_PASSWORD:-elastic_password}"
    index    => "app-logs-%{service}-%{+YYYY.MM.dd}"

    # Dead letter queue: retry failed writes, don't lose logs
    failure_type_logging_whitelist => []
    retry_on_conflict => 3
  }
}
