services:
  mysql:
    image: mysql:8.4
    container_name: infra-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infra-data-net

  mariadb:
    image: mariadb:11
    container_name: infra-mariadb
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${MARIADB_HOST_PORT:-13307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infra-data-net

  postgres:
    image: postgres:16
    container_name: infra-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-15434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infra-data-net

  redis:
    image: redis:7
    container_name: infra-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infra-data-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: infra-qdrant
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-16333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-16334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infra-data-net

  mongodb:
    image: mongo:7
    container_name: infra-mongodb
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${MONGO_HOST_PORT:-17017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 })' | mongosh mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@127.0.0.1:27017/admin --quiet"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - infra-data-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: infra-elasticsearch
    env_file:
      - .env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=${ELASTIC_SECURITY_ENABLED:-false}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic_password}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-19200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-elastic_password} http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infra-data-net

  # Chạy 1 lần để set password kibana_system sau khi ES sẵn sàng
  elasticsearch-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: infra-elasticsearch-setup
    env_file:
      - .env
    entrypoint: >
      bash -c '
        echo "Waiting for Elasticsearch...";
        until curl -s http://elasticsearch:9200 >/dev/null 2>&1; do sleep 3; done;
        if [ "${ELASTIC_SECURITY_ENABLED}" = "true" ]; then
          echo "Security enabled — setting kibana_system password...";
          curl -s -X POST -u elastic:${ELASTIC_PASSWORD}
            http://elasticsearch:9200/_security/user/kibana_system/_password
            -H "Content-Type: application/json"
            -d "{\"password\":\"${KIBANA_SYSTEM_PASSWORD}\"}";
          echo "Setup complete.";
        else
          echo "Security disabled — skipping setup.";
        fi
      '
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - infra-data-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: infra-logstash
    env_file:
      - .env
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic_password}
      - queue.type=persisted
      - queue.max_bytes=1gb
    ports:
      - "${LOGSTASH_BEATS_PORT:-15044}:5044"
      - "${LOGSTASH_TCP_PORT:-50000}:50000"
      - "${LOGSTASH_HTTP_PORT:-15080}:8080"
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - logstash_queue:/usr/share/logstash/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/50000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - infra-data-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: infra-kibana
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-kibana_system_password}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-changeme32characterslongsecretkey}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-changeme32characterslongsecretkey}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-changeme32characterslongsecretkey}
    ports:
      - "${KIBANA_HOST_PORT:-15601}:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      elasticsearch:
        condition: service_healthy
      elasticsearch-setup:
        condition: service_completed_successfully
    networks:
      - infra-data-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: infra-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_HOST_PORT:-19090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - elasticsearch
    networks:
      - infra-data-net

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: infra-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - infra-data-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: infra-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - infra-data-net

volumes:
  mysql_data:
  mariadb_data:
  postgres_data:
  redis_data:
  qdrant_data:
  mongo_data:
  elasticsearch_data:
  logstash_queue:
  prometheus_data:
  grafana_data:

networks:
  infra-data-net:
    name: infra-data-net
