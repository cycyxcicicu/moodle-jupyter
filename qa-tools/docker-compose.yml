services:
    mantis:
        build: ./mantis
        container_name: mantis-app
        ports:
            - "${MANTIS_PORT:-18081}:80"
        environment:
            QA_DB_USER: ${QA_DB_USER:-admin}
            QA_DB_PASSWORD: ${QA_DB_PASSWORD:-admin123}
            MANTIS_DB_NAME: ${MANTIS_DB_NAME:-mantis_db}
        volumes:
            - ${DATA_ROOT}/mantis/config:/var/www/html/config
            - ${DATA_ROOT}/mantis/files:/var/www/html/files
        networks:
            - infra-data-net

    testlink:
        build: ./testlink
        container_name: testlink-app
        ports:
            - "${TESTLINK_PORT:-18082}:80"
        environment:
            QA_DB_USER: ${QA_DB_USER:-admin}
            QA_DB_PASSWORD: ${QA_DB_PASSWORD:-admin123}
            TESTLINK_DB_NAME: ${TESTLINK_DB_NAME:-testlink_db}
        volumes:
            - ${DATA_ROOT}/testlink/upload_area:/var/testlink/upload_area
            - ${DATA_ROOT}/testlink/logs:/var/testlink/logs
        networks:
            - infra-data-net

networks:
    infra-data-net:
        name: infra-data-net
        external: true
